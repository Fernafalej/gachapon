<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Gachapon Häuschen</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css?v=20260419g">
</head>
<body>
  <div id="app">
    <header id="resource-bar">
      <div class="resource" id="res-wood">
        <span class="resource-icon">🪵</span>
        <span class="resource-value">0</span>
      </div>
      <div class="resource" id="res-stone">
        <span class="resource-icon">🪨</span>
        <span class="resource-value">0</span>
      </div>
      <div class="resource" id="res-food">
        <span class="resource-icon">🍞</span>
        <span class="resource-value">0</span>
      </div>
      <div class="resource" id="res-fabric">
        <span class="resource-icon">🧵</span>
        <span class="resource-value">0</span>
      </div>
    </header>

    <main id="screens">
      <div id="screen-house" class="screen active">
        <canvas id="room-canvas"></canvas>
        <div id="speech-bubbles-layer"></div>
        <div id="outside-scene" class="outside-scene hidden"></div>
        <div id="alpha-panel" class="alpha-panel hidden"></div>
        <button id="btn-alpha-guide" class="alpha-guide-chip hidden" type="button">Guide öffnen</button>
        <div id="house-view-toggle"></div>
        <div id="room-indicator"></div>
        <div id="debug-panel" class="debug-panel hidden"></div>
        <button id="btn-open-menu" class="research-btn menu-btn" aria-label="Spielmenü öffnen">
          <span class="research-icon">☰</span>
          <span class="research-label">Menü</span>
          <span id="research-point-count" class="research-count">0</span>
        </button>
        <div id="activity-badge" class="badge hidden">✔️</div>
      </div>

      <div id="screen-collection" class="screen">
        <h2 class="screen-title">Sammlung</h2>
        <div id="collection-filters">
          <button class="filter-btn active" data-filter="all">Alle</button>
          <button class="filter-btn" data-filter="common">Common</button>
          <button class="filter-btn" data-filter="rare">Rare</button>
          <button class="filter-btn" data-filter="super_rare">Super Rare</button>
        </div>
        <div id="species-filters">
          <button class="species-btn active" data-species="all">Alle</button>
          <button class="species-btn" data-species="bear">🐻</button>
          <button class="species-btn" data-species="bunny">🐰</button>
          <button class="species-btn" data-species="slime">🫧</button>
          <button class="species-btn" data-species="fox">🦊</button>
          <button class="species-btn" data-species="dragon">🐉</button>
        </div>
        <div id="collection-grid"></div>
      </div>

      <div id="screen-gacha" class="screen">
        <div id="gacha-token-display">
          <span class="token-icon">🪙</span>
          <span id="gacha-token-count">0</span>
          <span class="token-label">Tokens</span>
        </div>
        <div id="gacha-stage">
          <div id="gacha-machine"></div>
          <div id="gacha-result" class="hidden"></div>
        </div>
        <div id="gacha-controls">
          <button id="btn-add-tokens" class="gacha-btn secondary">Tokens verdienen</button>
          <button id="btn-draw-1" class="gacha-btn primary">×1 ziehen</button>
          <button id="btn-draw-10" class="gacha-btn primary" disabled>×10 ziehen</button>
        </div>
        <div id="gacha-info">
          <span id="pity-display">Nächste garantierte Rare in <strong id="pity-count">10</strong> Zügen</span>
          <span id="free-roll-badge" class="hidden">🎁 Free Roll!</span>
        </div>
      </div>

      <div id="screen-profile" class="screen">
        <h2 class="screen-title">Profil</h2>
        <div id="profile-stats">
          <div class="stat-card">
            <span class="stat-label">Gesamt-Züge</span>
            <span class="stat-value" id="stat-total-draws">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Figuren gefunden</span>
            <span class="stat-value" id="stat-unique-chars">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Räume</span>
            <span class="stat-value" id="stat-rooms">1</span>
          </div>
        </div>
        <div id="token-history">
          <h3>Token-History</h3>
          <div id="token-history-list"></div>
        </div>
        <div id="profile-actions">
          <button id="btn-reset" class="danger-btn">Spielstand zurücksetzen</button>
        </div>
      </div>
    </main>

    <nav id="bottom-nav">
      <button class="nav-tab active" data-screen="house">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Haus</span>
      </button>
      <button class="nav-tab" data-screen="collection">
        <span class="nav-icon">📖</span>
        <span class="nav-label">Sammlung</span>
      </button>
      <button class="nav-tab" data-screen="gacha">
        <span class="nav-icon">🎰</span>
        <span class="nav-label">Gacha</span>
      </button>
      <button class="nav-tab" data-screen="profile">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Profil</span>
      </button>
    </nav>

    <div id="modal-overlay" class="hidden">
      <div id="modal-content"></div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=20260419g"></script>
</body>
</html>
